name: Build APK Android

# Build gratuit de l'APK dans le cloud (GitHub Actions).
# Lancement : automatique a chaque push sur main, ou manuel (onglet Actions -> Run workflow).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web (www/)
        run: npm run build:www

      - name: Add Android platform
        run: npx cap add android

      - name: Generate icons & splash
        run: npx capacitor-assets generate --android --assetPath resources

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ventes-oeufs-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
